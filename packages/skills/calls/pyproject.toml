[project]
name = "huxley-skill-calls"
version = "0.1.0"
description = "Inbound call skill for Huxley — relays PCM between a caller's web app and grandpa's device via InputClaim."
requires-python = ">=3.13"
dependencies = [
    "huxley-sdk",
    # `websockets` is in the framework runtime already; we type-hint
    # against it for caller WS handling. No new transitive dep.
    "websockets>=14.0",
]

[project.entry-points."huxley.skills"]
calls = "huxley_skill_calls:CallsSkill"

[dependency-groups]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.24",
    "mypy>=1.13",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/huxley_skill_calls"]

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
