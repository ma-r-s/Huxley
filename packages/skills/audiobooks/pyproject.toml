[project]
name = "huxley-skill-audiobooks"
version = "0.1.0"
description = "Audiobook search and playback skill for Huxley."
requires-python = ">=3.13"
dependencies = [
    "huxley-sdk",
]

[project.entry-points."huxley.skills"]
audiobooks = "huxley_skill_audiobooks:AudiobooksSkill"

[dependency-groups]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.24",
    "mypy>=1.13",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/huxley_skill_audiobooks"]

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
