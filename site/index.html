<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#E94B2C" />
    <title>Huxley — A voice you can actually own.</title>
    <meta
      name="description"
      content="Huxley is a Python framework for real-time voice agents. Bring a persona and skills — it handles turn coordination, interrupts, proactive speech, audio bridging."
    />

    <!-- Open Graph / social card. Drop a 1200x630 PNG at public/og-image.png
         before launch — the path below resolves to /og-image.png at runtime.
         No image yet → some platforms fall back to the favicon, which is fine
         for now but worth replacing before HN. -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Huxley — A voice you can actually own." />
    <meta
      property="og:description"
      content="Open-source Python framework for real-time voice agents. Self-hosted. Skills as Python entry-points. Personas as YAML."
    />
    <meta property="og:image" content="/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <!-- Twitter / X card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Huxley — A voice you can actually own." />
    <meta
      name="twitter:description"
      content="Open-source Python framework for real-time voice agents. Self-hosted, skill-extensible, persona-configurable."
    />
    <meta name="twitter:image" content="/og-image.png" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="" />
    <link
      href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter+Tight:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
