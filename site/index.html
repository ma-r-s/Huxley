<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <!-- theme-color matches src/styles/index.css --hux-coral (oklch 0.62 0.19 23). -->
    <meta name="theme-color" content="#E2484D" />
    <title>Huxley — A voice you can actually own.</title>
    <meta
      name="description"
      content="Huxley is a Python framework for real-time voice agents. Bring a persona and skills — it handles turn coordination, interrupts, proactive speech, audio bridging."
    />

    <!-- Canonical URL. __SITE_URL__ is substituted at build time by the
         huxley-site-meta plugin in vite.config.ts; set VITE_SITE_URL to
         override the default. Don't hardcode absolute URLs anywhere — use
         the token so a single env var drives all SEO metadata. -->
    <link rel="canonical" href="__SITE_URL__/" />

    <!-- hreflang. Page is served as one URL with runtime language detection
         (i18next + localStorage); declare x-default + each supported locale
         pointing to the same canonical so Google knows it's intentionally
         multilingual rather than three duplicate pages. -->
    <link rel="alternate" hreflang="x-default" href="__SITE_URL__/" />
    <link rel="alternate" hreflang="en" href="__SITE_URL__/" />
    <link rel="alternate" hreflang="es" href="__SITE_URL__/" />
    <link rel="alternate" hreflang="fr" href="__SITE_URL__/" />

    <!-- Icon set generated by scripts/build-icons.py from the wordmark
         letterform. Re-run that script if the brand colors or font change. -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" sizes="any" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.webmanifest" />

    <!-- Open Graph / social card. og-image.png is generated alongside the
         icon set — same script regenerates it. -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="__SITE_URL__/" />
    <meta property="og:title" content="Huxley — A voice you can actually own." />
    <meta
      property="og:description"
      content="Open-source Python framework for real-time voice agents. Self-hosted. Skills as Python entry-points. Personas as YAML."
    />
    <meta property="og:image" content="__SITE_URL__/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <!-- Twitter / X card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Huxley — A voice you can actually own." />
    <meta
      name="twitter:description"
      content="Open-source Python framework for real-time voice agents. Self-hosted, skill-extensible, persona-configurable."
    />
    <meta name="twitter:image" content="__SITE_URL__/og-image.png" />

    <!-- JSON-LD structured data. Tells Google this is a software project, not
         a generic page — unlocks the "knowledge card" treatment when people
         search for the project by name. SoftwareSourceCode is the right type
         for an open-source project; SoftwareApplication is for installable
         end-user apps which Huxley isn't (skill authors install it; users
         consume a persona). -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "SoftwareSourceCode",
        "name": "Huxley",
        "description": "A Python framework for real-time voice agents. Bring a persona and skills — Huxley handles turn coordination, interrupts, proactive speech, and audio bridging.",
        "url": "__SITE_URL__/",
        "codeRepository": "https://github.com/ma-r-s/Huxley",
        "programmingLanguage": "Python",
        "license": "https://opensource.org/licenses/MIT",
        "author": {
          "@type": "Person",
          "name": "Mario Ruiz",
          "url": "https://ma-r-s.com"
        }
      }
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="" />
    <link
      href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter+Tight:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
