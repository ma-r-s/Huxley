## Managed components pulled via ESP-IDF Component Registry.
## Declared at the project level so versions are reproducible across
## checkouts.
dependencies:
  idf:
    version: ">=5.5,<6.0"
  espressif/esp_websocket_client: "~1.3.0"
  # Bundles ES7210 + ES8311 drivers behind the esp_codec_dev abstraction.
  # We use it the same way Waveshare does in their factory_01 demo — the
  # register-level init sequences live inside and we call the high-level
  # open/read/write API from hux_audio.
  espressif/esp_codec_dev: "~1.4.0"
