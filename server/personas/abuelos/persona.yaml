  system: {}

  # Telegram voice-call skill — `call_contact(name)` tool. Places a p2p
  # Telegram call and bridges grandpa's mic/speaker through the active
  # InputClaim. See docs/skills/telegram.md for the architecture.
  #
  # api_id / api_hash / userbot_phone are secrets — they come from env
  # vars (HUXLEY_TELEGRAM_API_ID, HUXLEY_TELEGRAM_API_HASH,
  # HUXLEY_TELEGRAM_USERBOT_PHONE) in real deployments. Set them in
  # `packages/core/.env` (gitignored). The skill also reads from this
  # block as a fallback; don't check real credentials in here.
  #
  # `contacts` maps spoken names (lowercase, as grandpa would say them)
  # to phone numbers. Phones are normalized (spaces / dashes / parens
  # stripped). A contact must have messaged the userbot at least once
  # so kurigram can resolve them by phone — cold lookups fail with
  # PEER_ID_INVALID.
  telegram:
    contacts:
      # Target phone from spikes/ (Mario's personal Telegram) — lets us
      # end-to-end test the skill by dialing Mario from the userbot.
      # Replace with real family phones for production. Names are
      # lowercased at load.
      mario: "+573186851696"
    inbound:
      enabled: true
      auto_answer: contacts_only

  # Timers skill — `set_timer(seconds, message)` tool + proactive
  # announcement via `inject_turn`. In-memory only for now (lost on
  # server restart); persistence arrives when Stage 3's background_task
  # supervisor lands.
  timers:
    # Fire prompt template — the Spanish default below is the on-record
    # AbuelOS tone. EN/FR overrides under `i18n.<lang>` keep the same
    # shape (imperative instruction to the LLM, `{message}` placeholder).
    fire_prompt: |
      Ha sonado un temporizador que el usuario programó. Avísale con
      tono amable y natural sobre: {message}. Empieza la frase como si
      se lo estuvieras recordando a un amigo (por ejemplo 'oye, recuerda
      que...' o 'ya es hora de...'). Usa una o dos frases cortas.
    i18n:
      en:
        fire_prompt: |
          A timer the user set has gone off. Let them know warmly and
          naturally about: {message}. Start the phrase as if you were
          reminding a friend (for example "hey, remember that..." or
          "it's time to..."). Use one or two short sentences.
      fr:
        fire_prompt: |
          Une minuterie que l'utilisateur a réglée vient de sonner.
          Préviens-le chaleureusement et naturellement au sujet de :
          {message}. Commence la phrase comme si tu rappelais à un ami
          (par exemple "tiens, rappelle-toi que..." ou "c'est l'heure
          de..."). Utilise une ou deux phrases courtes.

